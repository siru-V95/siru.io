<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빛나는행운상자 시뮬(루찌)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f131f; color: #dde; font-family: 'Malgun Gothic', sans-serif; font-size: 13px; }
  h1 { text-align: center; padding: 20px; color: #ffe680; font-size: 20px; border-bottom: 1px solid #2a3050; }
  .container { max-width: 1100px; margin: 0 auto; padding: 16px; }

  /* 탭 */
  .tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
  .tab-btn { padding: 6px 14px; background: #1e2540; border: 1px solid #2a3050; color: #aab; cursor: pointer; border-radius: 4px; }
  .tab-btn.active { background: #0066ff; color: #fff; border-color: #0066ff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* 테이블 */
  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  thead th { background: #0f131f; color: #ffe680; padding: 8px; border: 1px solid #2a3050; text-align: center; }
  tbody td { padding: 6px 10px; border: 1px solid #1e2540; color: #ccd; }
  tbody tr:hover { background: #1a1f35; }
  .group-header { background: #1a2540; color: #8af; font-weight: bold; text-align: center; padding: 8px; border: 1px solid #2a3050; }

  /* 확률 바 */
  .prob-bar { display: inline-block; height: 10px; background: #0066ff; border-radius: 3px; vertical-align: middle; margin-right: 6px; }

  /* 시뮬레이터 */
  .sim-box { background: #141828; border: 1px solid #2a3050; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
  .sim-box h2 { color: #ffe680; margin-bottom: 14px; font-size: 16px; }
  .sim-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .sim-controls label { color: #aab; }
  .sim-controls input[type=number] { width: 100px; padding: 6px 10px; background: #0f131f; border: 1px solid #3a4060; color: #fff; border-radius: 4px; font-size: 14px; }
  .btn { padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; }
  .btn-primary { background: #0066ff; color: #fff; }
  .btn-primary:hover { background: #0055dd; }
  .btn-reset { background: #444; color: #ccc; }
  .btn-reset:hover { background: #555; }
  .btn-quick { background: #1e3; color: #000; }

  /* 결과 */
  .result-summary { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; }
  .result-card { background: #0f131f; border: 1px solid #2a3050; border-radius: 6px; padding: 10px 16px; min-width: 130px; }
  .result-card .label { color: #778; font-size: 11px; margin-bottom: 4px; }
  .result-card .value { color: #ffe680; font-size: 20px; font-weight: bold; }

  .result-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .result-table { min-width: 480px; }
  .result-table td { font-size: 12px; }
  .result-table .cnt { color: #ffe680; font-weight: bold; text-align: right; }
  .result-table .pct { color: #7af; text-align: right; }
  .group-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; margin-right: 4px; }
  .g1 { background: #1a3060; color: #8af; }
  .g2 { background: #1a4030; color: #8f8; }
  .g3 { background: #3a3010; color: #fe8; }
  .g4 { background: #3a1020; color: #f88; }
  .g5 { background: #2a1060; color: #c8f; }
  .gb { background: #3a2000; color: #fc8; }

  .progress-wrap { margin-bottom: 8px; }
  .progress-bg { background: #1e2540; border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-fill { height: 8px; background: linear-gradient(90deg,#0066ff,#00ccff); border-radius: 4px; transition: width 0.2s; }

  /* 알림 */
  .notice { background: #1a2030; border-left: 3px solid #0066ff; padding: 8px 12px; color: #99b; margin-bottom: 12px; font-size: 12px; }

  /* 하단 채팅 래퍼 */
  #chatWrapper {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    max-width: 320px;
    z-index: 9999;
    pointer-events: all;
  }
  /* 채팅 헤더 (접기/펼치기 바) */
  #chatHeader {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #1a1a1a;
    border-top: 2px solid #ffd700;
    padding: 5px 10px;
    cursor: pointer;
    user-select: none;
  }
  #chatHeader .chat-title { color: #ffd700; font-size: 12px; font-weight: bold; }
  #chatHeader .chat-toggle { color: #ffd700; font-size: 12px; }
  #chatHeader .chat-clear { color: #aaa; font-size: 11px; background: #333; border: none; border-radius: 3px; padding: 2px 6px; cursor: pointer; }
  #chatHeader .chat-clear:hover { background: #555; }
  /* 채팅 메시지 목록 */
  #chatBox {
    max-height: 240px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 8px 8px 4px 8px;
    background: rgba(10,10,20,0.92);
  }
  #chatBox.hidden { display: none; }
  #chatBox::-webkit-scrollbar { width: 4px; }
  #chatBox::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 2px; }
  .chat-msg {
    background: #ffd700;
    color: #ff0000;
    font-size: 12px;
    font-weight: bold;
    padding: 6px 10px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    animation: slideIn 0.3s ease;
    text-shadow: none;
    border-left: 4px solid #ff8800;
    line-height: 1.5;
  }
  .chat-msg .chat-label { font-size: 10px; color: #ff0000; opacity: 0.85; margin-bottom: 2px; }
  .chat-msg .chat-item { font-size: 13px; color: #ff0000; }
  .chat-msg .chat-cnt { font-size: 11px; color: #ff0000; opacity: 0.9; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-30px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes sparkle {
    0%   { background: #ffd700; box-shadow: 0 0 6px 2px #ffd700; }
    20%  { background: #fff700; box-shadow: 0 0 18px 6px #fff176; }
    40%  { background: #ffe066; box-shadow: 0 0 10px 3px #ffcc00; }
    60%  { background: #ffffff; box-shadow: 0 0 22px 8px #ffe680; }
    80%  { background: #ffd700; box-shadow: 0 0 12px 4px #ffd700; }
    100% { background: #ffd700; box-shadow: 0 0 6px 2px #ffd700; }
  }
  .chat-msg.rare {
    animation: slideIn 0.3s ease, sparkle 1s ease-in-out infinite;
    border-left: 4px solid #fff;
    border: 2px solid #fff176;
  }
  .chat-msg.rare .chat-label,
  .chat-msg.rare .chat-item,
  .chat-msg.rare .chat-cnt {
    color: #cc0000;
    font-weight: 900;
  }
  .chat-msg.rare .chat-item {
    font-size: 14px;
  }
  .loading { text-align: center; color: #7af; padding: 20px; }
  .error { color: #f88; padding: 8px; }

  /* 확률 표 색 */
  .high { color: #f88; }
  .mid { color: #fe8; }
  .low { color: #8f8; }

  /* ==================== 반응형 모바일 ==================== */
  @media (max-width: 600px) {
    body { font-size: 12px; }

    h1 { font-size: 15px; padding: 12px 8px; }

    .container { padding: 8px; }

    /* 탭 버튼 */
    .tabs { gap: 3px; }
    .tab-btn { padding: 6px 10px; font-size: 12px; flex: 1; text-align: center; }

    /* 시뮬 박스 */
    .sim-box { padding: 12px 10px; }
    .sim-box h2 { font-size: 14px; margin-bottom: 10px; }

    /* 컨트롤 버튼 줄 */
    .sim-controls { gap: 6px; }
    .sim-controls label { width: 100%; margin-bottom: 2px; }
    .sim-controls input[type=number] { width: 70px; font-size: 13px; padding: 5px 8px; }
    .btn { padding: 7px 12px; font-size: 12px; }

    /* 요약 카드 */
    .result-summary { gap: 8px; }
    .result-card { flex: 1; min-width: 90px; padding: 8px 10px; }
    .result-card .value { font-size: 16px; }

    /* 결과 테이블 */
    .result-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .result-table th, .result-table td { font-size: 11px; padding: 5px 6px; white-space: nowrap; }
    .result-table thead th:first-child { display: none; }
    .result-table tbody td:first-child { display: none; }

    /* 확률 바 테이블 */
    table th, table td { font-size: 11px; padding: 5px 6px; }
    .progress-bg { width: 80px !important; }

    /* 그룹 배지 */
    .group-badge { font-size: 10px; padding: 1px 4px; }

    /* 알림 바 */
    .notice { font-size: 11px; padding: 6px 8px; }

    /* 채팅 래퍼 - 모바일에서 전체 너비 */
    #chatWrapper { max-width: 100%; }
    #chatBox { max-height: 160px; }
    .chat-msg { font-size: 11px; padding: 5px 8px; }
    .chat-msg .chat-item { font-size: 12px; }
  }
</style>
</head>

<!-- 하단 채팅 알림 -->
<div id="chatWrapper">
  <div id="chatBox"></div>
  <div id="chatHeader" onclick="toggleChat()">
    <span class="chat-title">💬 일반-4 획득 알림</span>
    <span>
      <button class="chat-clear" onclick="event.stopPropagation(); clearChat()">✕ 지우기</button>
      &nbsp;
      <span class="chat-toggle" id="chatToggleIcon">▲ 접기</span>
    </span>
  </div>
</div>

<h1>✨ 빛나는행운상자 시뮬레이터</h1>

<div class="container">

  <div class="notice" id="dataNotice">
    📡 데이터 로딩 중... (실시간 파싱 시도)
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('tab-sim')">🎲 시뮬레이션</button>
    <button class="tab-btn" onclick="showTab('tab-prob')">📊 확률 정보</button>
    <button class="tab-btn" onclick="showTab('tab-items')">📦 구성품 목록</button>
  </div>

  <!-- 시뮬레이션 탭 -->
  <div id="tab-sim" class="tab-content active">
    <div class="sim-box">
      <h2>🎲 상자 열기 시뮬레이션</h2>
      <div class="sim-controls">
        <label>수량:</label>
        <input type="number" id="simCount" value="1" min="1" max="10">
        <button class="btn btn-primary" onclick="runSim()">▶ 시작</button>
        <button class="btn btn-quick" onclick="document.getElementById('simCount').value=1;runSim()">x1</button>
        <button class="btn btn-quick" onclick="document.getElementById('simCount').value=5;runSim()">x5</button>
        <button class="btn btn-quick" onclick="document.getElementById('simCount').value=10;runSim()">x10</button>
        <button class="btn btn-reset" onclick="resetSim()">초기화</button>
      </div>

      <div id="simResults" style="display:none">
        <div class="result-summary" id="simSummary"></div>
        <div class="result-table-wrap">
          <table class="result-table">
            <thead>
              <tr>
                <th style="width:40px">순위</th>
                <th>아이템</th>
                <th style="width:60px">수량</th>
                <th style="width:80px">획득 수</th>
                <th style="width:80px">획득률</th>
                <th style="width:120px">이론 확률</th>
              </tr>
            </thead>
            <tbody id="simResultBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 확률 정보 탭 -->
  <div id="tab-prob" class="tab-content">
    <div class="sim-box">
      <h2>📊 그룹별 확률 구조</h2>
      <div class="notice">상자 1개 오픈 시 일반 그룹 중 1개가 선택되며, 보너스 그룹은 항상 지급됩니다.</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="min-width:400px">
        <thead>
          <tr>
            <th>그룹명</th>
            <th>선택 확률</th>
            <th>확률 바</th>
            <th>구성품 수</th>
            <th>특이사항</th>
          </tr>
        </thead>
        <tbody id="groupProbTable"></tbody>
      </table>
      </div>
    </div>
  </div>

  <!-- 구성품 목록 탭 -->
  <div id="tab-items" class="tab-content">
    <div class="sim-box">
      <h2>📦 전체 구성품 목록</h2>
      <div class="notice">실제 확률 = 그룹 확률 × 그룹 내 확률 (보너스 그룹 제외)</div>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="min-width:420px">
        <thead>
          <tr>
            <th>그룹</th>
            <th>아이템 이름</th>
            <th>수량</th>
            <th>그룹내 확률</th>
            <th>실제 획득 확률</th>
          </tr>
        </thead>
        <tbody id="allItemsTable"></tbody>
      </table>
      </div>
    </div>
  </div>

</div>

const GROUP_CLASSES = ['g1','g2','g3','g4','g5','gb'];
const GROUP_COLORS = ['#1a3060','#1a4030','#3a3010','#3a1020','#2a1060','#3a2000'];

// 누적 확률 미리 계산
function buildCumulative(items) {
  const total = items.reduce((s, i) => s + i.prob, 0);
  let cum = 0;
  return items.map(item => {
    cum += item.prob / total * 100;
    return {...item, cum};
  });
}

function pickItem(cumItems) {
  const r = Math.random() * 100;
  for (const item of cumItems) {
    if (r <= item.cum) return item;
  }
  return cumItems[cumItems.length - 1];
}

// 일반 그룹 누적 확률
const normalGroups = BOX_DATA.groups.filter(g => !g.isBonus);
const bonusGroups  = BOX_DATA.groups.filter(g => g.isBonus);
const normalTotal  = normalGroups.reduce((s,g) => s + g.prob, 0);
let normalCum = 0;
const normalGroupsCum = normalGroups.map(g => {
  normalCum += g.prob / normalTotal * 100;
  return {...g, cum: normalCum, cumItems: buildCumulative(g.items)};
});
const bonusCumItems = bonusGroups.map(g => ({...g, cumItems: buildCumulative(g.items)}));

// 상자 1회 오픈
function openBox() {
  const results = [];
  // 일반 그룹
  const r = Math.random() * 100;
  for (const g of normalGroupsCum) {
    if (r <= g.cum) {
      const item = pickItem(g.cumItems);
      results.push({group: g.name, groupIdx: normalGroups.indexOf(normalGroups.find(x=>x.name===g.name)), ...item});
      break;
    }
  }
  // 보너스 그룹
  for (const g of bonusCumItems) {
    const item = pickItem(g.cumItems);
    results.push({group: g.name, groupIdx: 5, ...item});
  }
  return results;
}

// 시뮬레이션 실행
let totalOpens = 0;
const globalCounts = {};

function runSim() {
  const count = parseInt(document.getElementById('simCount').value) || 1;
  if (count < 1 || count > 10) return alert('1~10 사이로 입력해주세요.');

  for (let i = 0; i < count; i++) {
    const results = openBox();
    for (const r of results) {
      const key = `${r.group}__${r.name}__${r.cnt}`;
      if (!globalCounts[key]) globalCounts[key] = {group:r.group, groupIdx:r.groupIdx, name:r.name, cnt:r.cnt, count:0, theoProbGroup:r.prob};
      globalCounts[key].count++;

      // 일반-4 아이템이면 채팅 알림
      if (r.group === '일반-4') {
        addChatMsg(r.name, r.cnt, totalOpens + 1);
      }
    }
    totalOpens++;
  }

  renderResults();
  document.getElementById('simResults').style.display = 'block';
}

function resetSim() {
  totalOpens = 0;
  Object.keys(globalCounts).forEach(k => delete globalCounts[k]);
  document.getElementById('simResults').style.display = 'none';
}

function renderResults() {
  // 요약
  const items = Object.values(globalCounts);
  const totalItems = items.reduce((s,i) => s + i.count, 0);
  document.getElementById('simSummary').innerHTML = `
    <div class="result-card"><div class="label">총 오픈 횟수</div><div class="value">${totalOpens.toLocaleString()}</div></div>
    <div class="result-card"><div class="label">총 획득 아이템</div><div class="value">${totalItems.toLocaleString()}</div></div>
    <div class="result-card"><div class="label">종류 수</div><div class="value">${items.length.toLocaleString()}</div></div>
  `;

  // 일반 그룹 아이템만 정렬 (보너스 제외)
  const sorted = [...items].sort((a,b) => b.count - a.count);
  const normalOpens = totalOpens;

  let html = '';
  sorted.forEach((item, idx) => {
    const gClass = GROUP_CLASSES[item.groupIdx] || 'g1';
    const actualPct = (item.count / normalOpens * 100).toFixed(3);
    const gProb = item.isBonus ? 100 : (normalGroups[item.groupIdx]?.prob || 0);
    const theoPct = item.group.includes('보너스') ? item.theoProbGroup.toFixed(3) : (gProb * item.theoProbGroup / 100).toFixed(3);
    const probBar = Math.min(parseFloat(actualPct) * 3, 100);
    const probClass = parseFloat(theoPct) >= 5 ? 'high' : parseFloat(theoPct) >= 1 ? 'mid' : 'low';
    html += `<tr>
      <td style="text-align:center;color:#778">${idx+1}</td>
      <td>
        <span class="group-badge ${gClass}">${item.group}</span>
        ${item.name}
      </td>
      <td style="text-align:center;color:#aab">x${item.cnt.toLocaleString()}</td>
      <td class="cnt">${item.count.toLocaleString()}회</td>
      <td class="pct">${actualPct}%</td>
      <td>
        <div class="progress-wrap">
          <div style="color:${parseFloat(theoPct)>=5?'#f88':parseFloat(theoPct)>=1?'#fe8':'#8f8'};font-size:11px">${theoPct}%</div>
          <div class="progress-bg"><div class="progress-fill" style="width:${probBar}%"></div></div>
        </div>
      </td>
    </tr>`;
  });
  document.getElementById('simResultBody').innerHTML = html;
}

}

// 전체 아이템 탭 렌더링
function renderAllItems() {
  let html = '';
  const normalTotal2 = normalGroups.reduce((s,g) => s + g.prob, 0);
  BOX_DATA.groups.forEach((g, idx) => {
    const gClass = GROUP_CLASSES[idx];
    g.items.forEach(item => {
      const realProb = g.isBonus ? item.prob : (g.prob / normalTotal2 * 100 * item.prob / 100);
      const probClass = realProb >= 2 ? 'high' : realProb >= 0.5 ? 'mid' : 'low';
      html += `<tr>
        <td><span class="group-badge ${gClass}">${g.name}<br><small>${g.prob}%</small></span></td>
        <td>${item.name}</td>
        <td style="text-align:center;color:#aab">x${item.cnt.toLocaleString()}</td>
        <td style="text-align:right;color:#7af">${item.prob.toFixed(3)}%</td>
        <td style="text-align:right" class="${probClass}">${realProb.toFixed(4)}%</td>
      </tr>`;
    });
  });
  document.getElementById('allItemsTable').innerHTML = html;
}

const MAX_CHAT = 50; // 최대 채팅 메시지 수

function addChatMsg(itemName, cnt, openIdx) {
  const box = document.getElementById('chatBox');
  const msg = document.createElement('div');
  const isRare = itemName.includes('빛나는MG훈장');
  msg.className = 'chat-msg' + (isRare ? ' rare' : '');
  msg.innerHTML = isRare
    ? `<div class="chat-label">🌟 희귀 아이템 획득!!</div>
       <div class="chat-item">💎 ${itemName}</div>
       <div class="chat-cnt">수량: x${cnt.toLocaleString()} &nbsp;|&nbsp; ${openIdx}번째 오픈</div>`
    : `<div class="chat-label">🎁 일반-4 아이템 획득!</div>
       <div class="chat-item">✨ ${itemName}</div>
       <div class="chat-cnt">수량: x${cnt.toLocaleString()} &nbsp;|&nbsp; ${openIdx}번째 오픈</div>`;
  box.appendChild(msg);

  // 최대 메시지 수 초과 시 오래된 것 제거
  while (box.children.length > MAX_CHAT) {
    box.removeChild(box.firstChild);
  }

  // 스크롤 최하단
  box.scrollTop = box.scrollHeight;
}

function clearChat() {
  document.getElementById('chatBox').innerHTML = '';
}

function toggleChat() {
  const box = document.getElementById('chatBox');
  const icon = document.getElementById('chatToggleIcon');
  if (box.classList.contains('hidden')) {
    box.classList.remove('hidden');
    icon.textContent = '▲ 접기';
  } else {
    box.classList.add('hidden');
    icon.textContent = '▼ 펼치기';
  }
}
